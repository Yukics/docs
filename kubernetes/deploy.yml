apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-nginx
  labels:
    app: docs-nginx
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: docs-nginx
  template:
    metadata:
      labels:
        app: docs-nginx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        # fsGroupChangePolicy: "OnRootMismatch"
        fsGroupChangePolicy: "Always"
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: build-docs
        image: docker.io/yukics/quartz-job:20260326v1
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: docs-storage
          mountPath: /public
        - name: nginx-config-volume
          mountPath: /tmp/custom/quartz.config.ts
          subPath: quartz.config.ts
        - name: tmp-dir
          mountPath: /tmp
        - name: home-dir
          mountPath: /home/user   # ajusta al home del uid 1001 en tu imagen
        envFrom:
        - configMapRef:
            name: docs-config
        # securityContext:
        #   allowPrivilegeEscalation: false
        #   readOnlyRootFilesystem: true     
      containers:
      - name: docs-nginx
        image: nginx:stable-alpine3.23-slim
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 10
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: docs-storage
          mountPath: /usr/share/nginx
          subPath: html
        - name: tmp-dir
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config
      - name: docs-storage
        persistentVolumeClaim:
          claimName: docs-pvc
      - name: tmp-dir
        emptyDir: {}
      - name: home-dir
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}