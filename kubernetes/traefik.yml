apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sec-headers-docs
spec:
  headers:
    frameDeny: true
    browserXssFilter: true
    accessControlAllowMethods:
      - "GET"
      # - "OPTIONS"
      # - "PUT"
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://*.yukics.net"
      - "https://*.yuki.es"
      - "https://static.cloudflareinsights.com"
    accessControlMaxAge: 100
    addVaryHeader: true
    sslRedirect: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    contentTypeNosniff: true
    # --- CSP y Referrer Policy ---
    customResponseHeaders:
      # Permite scripts de tus dominios y de Cloudflare
      Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-eval' https://static.cloudflareinsights.com https://*.yukics.net https://*.yukics.es https://cdn.jsdelivr.net 'sha256-AE0EQudVMDsl926YZzlYRgeKgzPan7WBWeH3xMTf9kE=' 'sha256-ToyrjEgxDDchSN6B5DAZBdYc3FmjH4tzXNfd/m7Jo08=' 'sha256-u7XfqJk/4MeesczJgatBJYG/Cy/MuY0ako1AdLPaiPI=' 'sha256-jb0Sw2NBwvsY3maDOhKeWQX0xKEVSwpUOYP+xdBsS1A=' 'sha256-LxtIciogoF9L7bvizkV5RJxWGc4gmBIqgvQ1i472vrQ=' 'sha256-JTsinhwk0yHO6G4vsBxPTTVlHaBlAehCAyaTDBuZ2gU=' 'sha256-w/Hq9FlDmDdA972TivGm3D+Yvo+4nuCZ65LImCwmyb0=' 'sha256-G/nxaMPdCt9yxFKGCiv8rZMACILHUOzkqSoK51Pz0Mk=' 'sha256-XGk2i/KEtNU3M6SZsLSre7XvrM17l+kWgWxfTyAnBRM=' 'sha256-cY9Y89+AYZz2wa+Yw5MWnSSquerq5Tp0zFtP+6ioxrk=' 'sha256-kflrEkQb6S566mMDpAcjPQkHE0ywbd44hFw9dPwaUlM='; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' https://*.gyazo.com;"
      # Evita filtrar información de la URL de origen a otros sitios
      Referrer-Policy: "strict-origin-when-cross-origin"
      # Deshabilita funciones del navegador no deseadas (Cámara, Micro, etc)
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ratelimit-docs
spec:
  rateLimit:
    average: 20
    period: 1s
    burst: 40
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: inflightreq-docs
spec:
  inFlightReq:
    amount: 10
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: docs-ingressroute
spec:
  entryPoints:
    - websecure
  tls:
    certResolver: letsencrypt
  routes:
  - kind: Rule
    middlewares:
      - name: ratelimit-docs
      - name: inflightreq-docs
      - name: sec-headers-docs
    match: Host(`docs.yukics.net`) || Host(`docs.yuki.es`)
    services:
    - kind: Service
      name: docs-nginx-service
      namespace: docs
      passHostHeader: true
      port: 80
    observability:
      accessLogs: true
      traceVerbosity: minimal