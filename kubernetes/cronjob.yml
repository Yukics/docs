apiVersion: batch/v1
kind: CronJob
metadata:
  name: docs-refresh-cron
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: false
            fsGroup: 1001
            fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
          containers:
          - name: build-docs-job
            image: docker.io/yukics/quartz-job:20260326v1
            imagePullPolicy: IfNotPresent
            volumeMounts:
            - name: docs-storage
              mountPath: /public
            - name: nginx-config-volume
              mountPath: /tmp/custom/quartz.config.ts
              subPath: quartz.config.ts              
            envFrom:
            - configMapRef:
                name: docs-config     
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop: ["ALL"]               
          restartPolicy: OnFailure
          volumes:
          - name: nginx-config-volume
            configMap:
              name: nginx-config          
          - name: docs-storage
            persistentVolumeClaim:
              claimName: docs-pvc