apiVersion: batch/v1
kind: CronJob
metadata:
  name: docs-refresh-cron
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001 # nginx uid
            runAsGroup: 1001 # nginx gid
            fsGroup: 1001 # nginx gid
            seccompProfile:
            type: RuntimeDefault
          containers:
          - name: build-docs-job
            image: docker.io/yukics/quartz-job:20260326v1
            imagePullPolicy: IfNotPresent
            volumeMounts:
            - name: docs-storage
              mountPath: /public
            - name: nginx-config-volume
              mountPath: /tmp/custom/quartz.config.ts
              subPath: quartz.config.ts              
            envFrom:
            - configMapRef:
                name: docs-config          
          restartPolicy: OnFailure
          volumes:
          - name: nginx-config-volume
            configMap:
              name: nginx-config          
          - name: docs-storage
            persistentVolumeClaim:
              claimName: docs-pvc